<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #141e30, #243b55);
            min-height:100vh;
            font-family: Arial, sans-serif;
            color:white;
        }

        .main-box{
            max-width:600px;
            margin:80px auto;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#00ffae;
        }

        .task-item{
            background:#334155;
            padding:12px;
            border-radius:10px;
            margin-top:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .completed{
            text-decoration:line-through;
            opacity:0.6;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#aaa;
            font-size:14px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="main-box">

        <h1>Task Tracker</h1>

        <div class="input-group mb-3">

            <input type="text" id="taskInput" class="form-control" placeholder="Enter your task">

            <button class="btn btn-success" onclick="addTask()">
                Add
            </button>

        </div>

        <div id="taskList"></div>

        <div class="footer">
            Built using Spring Boot + Jenkins + GitHub
        </div>

    </div>

</div>

<script>

    function addTask(){

        let input = document.getElementById("taskInput");

        let task = input.value;

        if(task.trim() === ""){
            alert("Please enter a task");
            return;
        }

        let taskDiv = document.createElement("div");

        taskDiv.className = "task-item";

        taskDiv.innerHTML = `
            <span onclick="toggleComplete(this)">
                ${task}
            </span>

            <button class="btn btn-danger btn-sm" onclick="deleteTask(this)">
                Delete
            </button>
        `;

        document.getElementById("taskList").appendChild(taskDiv);

        input.value = "";
    }

    function deleteTask(button){

        button.parentElement.remove();

    }

    function toggleComplete(task){

        task.classList.toggle("completed");

    }

</script>

</body>
</html>
